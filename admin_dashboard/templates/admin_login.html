{% extends "admin_base.html" %}
{% block title %}Login - Eko Admin Portal{% endblock %}
{% block body %}
<div class="login">
  <h1>Eko <span style="color:var(--accent)">Admin</span></h1>
  <p class="sub" style="text-align:center">Fleet monitoring - PII-free</p>
  <form method="POST">
    <label>Login ID</label>
    <input type="text" name="login_id" required autofocus>
    <label>Password</label>
    <input type="password" name="password" required>
    <button type="submit">Sign in</button>
  </form>
</div>
{% endblock %}
