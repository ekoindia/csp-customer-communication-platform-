name: Build CSP Scan APK

# Builds the CSP Scan Android app (a WebView shell around
# csp_dashboard/mobile_scanner/scan.html) and publishes a downloadable,
# debug-signed .apk as a workflow artifact. No Android Studio needed locally.

on:
  push:
    paths:
      - 'mobile_app/**'
      - 'csp_dashboard/mobile_scanner/scan.html'
      - '.github/workflows/build-apk.yml'
  workflow_dispatch:

permissions:
  contents: write   # needed to publish the APK to a Release

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Bundle scanner + libraries (fully offline) into app assets
        run: |
          A=mobile_app/app/src/main/assets
          B="https://appassets.androidplatform.net/assets/lib"
          mkdir -p "$A/lib"
          cp csp_dashboard/mobile_scanner/scan.html    "$A/scan.html"
          cp csp_dashboard/mobile_scanner/manifest.json "$A/manifest.json"
          cp csp_dashboard/mobile_scanner/icon.svg      "$A/icon.svg"
          # Rewrite the BUNDLED copy so every library loads from local assets —
          # the app then needs NO internet at runtime. (Source scan.html stays
          # CDN-based so it can still be opened directly in a browser for demos.)
          H="$A/scan.html"
          sed -i "s#https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js#$B/tesseract.min.js#g" "$H"
          sed -i "s#https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/worker.min.js#$B/worker.min.js#g" "$H"
          sed -i "s#https://cdn.jsdelivr.net/npm/tesseract.js-core@5/tesseract-core.wasm.js#$B/tesseract-core.wasm.js#g" "$H"
          sed -i "s#https://tessdata.projectnaptha.com/4.0.0#$B#g" "$H"
          sed -i "s#https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js#$B/xlsx.full.min.js#g" "$H"
          sed -i "s#https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js#$B/pdf.min.js#g" "$H"
          sed -i "s#https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js#$B/pdf.worker.min.js#g" "$H"
          echo "== local lib refs in bundled scan.html =="; grep -c "appassets.androidplatform.net/assets/lib" "$H"
          # Download the libraries into the bundle.
          cd "$A/lib"
          dl(){ echo "  -> $2"; curl -fsSL --retry 3 "$1" -o "$2"; }
          dl https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js        tesseract.min.js
          dl https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/worker.min.js           worker.min.js
          dl https://cdn.jsdelivr.net/npm/tesseract.js-core@5/tesseract-core.wasm.js       tesseract-core.wasm.js
          dl https://cdn.jsdelivr.net/npm/tesseract.js-core@5/tesseract-core.wasm          tesseract-core.wasm
          dl https://cdn.jsdelivr.net/npm/tesseract.js-core@5/tesseract-core-simd.wasm.js  tesseract-core-simd.wasm.js
          dl https://cdn.jsdelivr.net/npm/tesseract.js-core@5/tesseract-core-simd.wasm     tesseract-core-simd.wasm
          dl https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js           xlsx.full.min.js
          dl https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js        pdf.min.js
          dl https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.worker.min.js pdf.worker.min.js
          dl https://tessdata.projectnaptha.com/4.0.0/eng.traineddata.gz             eng.traineddata.gz
          echo "== bundled libs =="; ls -lh

      - name: Download Gradle 8.5
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.5-bin.zip
          unzip -q gradle-8.5-bin.zip

      - name: Build release APK (non-debuggable, debug-signed for sideload)
        working-directory: mobile_app
        run: ../gradle-8.5/bin/gradle assembleRelease --no-daemon --stacktrace

      - name: Rename APK
        run: |
          cp mobile_app/app/build/outputs/apk/release/app-release.apk CSP-Scan.apk
          ls -lh CSP-Scan.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: CSP-Scan-APK
          path: CSP-Scan.apk
          if-no-files-found: error

      - name: Publish APK to a Release (direct .apk download, no zip)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-latest
          name: CSP Scan — latest APK
          body: |
            Latest **CSP Scan** Android app (fully offline, no internet permission).
            Download **CSP-Scan.apk** below and send it to the CSP over WhatsApp.
          files: CSP-Scan.apk
          fail_on_unmatched_files: true
          make_latest: true
