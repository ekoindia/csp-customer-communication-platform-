name: Deploy Scanner UI to Pages

# Publishes the client-side scanner (csp_dashboard/mobile_scanner/) to GitHub
# Pages over HTTPS, so a CSP can open it on the phone (camera + Web Crypto need a
# secure context) and "Add to Home screen". The page is code-only — no customer
# data is ever hosted, so public hosting is DPDP-safe.

on:
  push:
    paths:
      - 'csp_dashboard/mobile_scanner/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site (scanner UI at the site root)
        run: |
          mkdir -p site
          cp csp_dashboard/mobile_scanner/scan.html    site/index.html
          cp csp_dashboard/mobile_scanner/manifest.json site/manifest.json
          cp csp_dashboard/mobile_scanner/icon.svg      site/icon.svg
          ls -l site

      - name: Configure Pages (enable if needed)
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
