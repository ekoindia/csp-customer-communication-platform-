plugins {
    id 'com.android.application'
    id 'org.jetbrains.kotlin.android'
}

android {
    namespace 'co.eko.cspscan'
    compileSdk 34

    defaultConfig {
        applicationId "co.eko.cspscan"
        minSdk 26          // adaptive-icon only (no PNG mipmaps needed); covers Android 8+
        targetSdk 34
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        release {
            minifyEnabled false
            debuggable false                     // not debuggable -> no ADB data extraction
            signingConfig signingConfigs.debug   // sign with the auto debug key so it installs (sideload); not for Play Store
        }
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }
    kotlinOptions {
        jvmTarget = '17'
    }
}

dependencies {
    implementation 'androidx.core:core-ktx:1.12.0'
    implementation 'androidx.activity:activity-ktx:1.8.2'
    implementation 'androidx.webkit:webkit:1.9.0'
}
